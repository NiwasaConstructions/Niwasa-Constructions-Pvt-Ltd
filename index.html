<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niwasa Constructions ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .app-section { display: none; }
        .app-section.active { display: block; }
        .sidebar a { cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-section" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow border-0">
                    <div class="card-body text-center p-4">
                        <h4 class="mb-4">Niwasa ERP Login</h4>
                        <input type="email" id="email" class="form-control mb-3" placeholder="Email Address">
                        <input type="password" id="password" class="form-control mb-3" placeholder="Password">
                        <button id="login-btn" class="btn btn-primary w-100">Login</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="container mt-4" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h3 class="mb-0 text-primary">Aththanayaka Niwasa Constructions</h3>
            <button id="logout-btn" class="btn btn-outline-danger btn-sm">Logout</button>
        </div>
        
        <div class="row">
            <div class="col-md-3 mb-3">
                <div class="list-group sidebar shadow-sm">
                    <a id="nav-vendors" class="list-group-item list-group-item-action active">Vendors</a>
                    <a id="nav-sites" class="list-group-item list-group-item-action">Sites</a>
                    <a id="nav-bills" class="list-group-item list-group-item-action">Bills</a>
                    <a id="nav-payments" class="list-group-item list-group-item-action bg-success text-white">Make Payment</a>
                </div>
            </div>
            
            <div class="col-md-9">
                
                <div id="section-vendors" class="app-section active card shadow-sm">
                    <div class="card-header bg-dark text-white">Manage Vendors</div>
                    <div class="card-body">
                        <form id="vendor-form" class="row g-2 mb-4">
                            <div class="col-md-5"><input type="text" id="v-name" class="form-control" placeholder="Vendor Name" required></div>
                            <div class="col-md-5"><input type="text" id="v-contact" class="form-control" placeholder="Contact"></div>
                            <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Add</button></div>
                        </form>
                        <table class="table table-sm table-bordered">
                            <thead><tr><th>Name</th><th>Contact</th></tr></thead>
                            <tbody id="v-table"></tbody>
                        </table>
                    </div>
                </div>

                <div id="section-sites" class="app-section card shadow-sm">
                    <div class="card-header bg-dark text-white">Manage Sites</div>
                    <div class="card-body">
                        <form id="site-form" class="row g-2 mb-4">
                            <div class="col-md-10"><input type="text" id="s-name" class="form-control" placeholder="Site Name / Location" required></div>
                            <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Add</button></div>
                        </form>
                        <table class="table table-sm table-bordered">
                            <thead><tr><th>Site Name</th></tr></thead>
                            <tbody id="s-table"></tbody>
                        </table>
                    </div>
                </div>

                <div id="section-bills" class="app-section card shadow-sm">
                    <div class="card-header bg-dark text-white">Add New Bill</div>
                    <div class="card-body">
                        <form id="bill-form" class="row g-3 mb-4">
                            <div class="col-md-4">
                                <select id="b-vendor" class="form-select vendor-dropdown" required><option value="">Select Vendor</option></select>
                            </div>
                            <div class="col-md-4">
                                <select id="b-site" class="form-select site-dropdown" required><option value="">Select Site</option></select>
                            </div>
                            <div class="col-md-4"><input type="text" id="b-number" class="form-control" placeholder="Bill No" required></div>
                            <div class="col-md-4"><input type="number" id="b-amount" class="form-control" placeholder="Total Amount" required></div>
                            <div class="col-md-4">
                                <select id="b-type" class="form-select" required>
                                    <option value="CREDIT">Credit</option>
                                    <option value="CASH">Cash (Paid instantly)</option>
                                </select>
                            </div>
                            <div class="col-md-4"><button type="submit" class="btn btn-primary w-100">Add Bill</button></div>
                        </form>
                        <h6 class="mt-4">Recent Bills</h6>
                        <table class="table table-sm table-bordered">
                            <thead><tr><th>Bill No</th><th>Amount</th><th>Paid</th><th>Status</th></tr></thead>
                            <tbody id="b-table"></tbody>
                        </table>
                    </div>
                </div>

                <div id="section-payments" class="app-section card shadow-sm border-success">
                    <div class="card-header bg-success text-white">Make Payment & Set-off Bills</div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <select id="p-vendor" class="form-select vendor-dropdown"><option value="">Select Vendor First</option></select>
                            </div>
                        </div>
                        
                        <div id="pending-bills-container" style="display:none;" class="mb-4 p-3 bg-light border rounded">
                            <h6>Pending Bills for Set-off</h6>
                            <table class="table table-sm">
                                <thead><tr><th>Bill No</th><th>Due Amount</th><th>Pay Amount</th></tr></thead>
                                <tbody id="p-bills-table"></tbody>
                            </table>
                            <div class="text-end fw-bold">Total Allocating: Rs. <span id="p-total-calc">0</span></div>
                        </div>

                        <form id="payment-form" class="row g-3" style="display:none;">
                            <div class="col-md-4">
                                <select id="p-method" class="form-select" required>
                                    <option value="CASH">Cash</option>
                                    <option value="DFCC_BANK">DFCC Bank Transfer</option>
                                    <option value="SAMPATH_BANK">Sampath Bank Transfer</option>
                                    <option value="DFCC_CHEQUE">DFCC Cheque</option>
                                    <option value="SAMPATH_CHEQUE">Sampath Cheque</option>
                                </select>
                            </div>
                            <div class="col-md-4"><input type="text" id="p-ref" class="form-control" placeholder="Cheque/Ref Number (Optional)"></div>
                            <div class="col-md-4"><button type="submit" class="btn btn-success w-100">Confirm Payment</button></div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
